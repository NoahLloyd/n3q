name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm --filter @n3q/shared exec tsc --noEmit

      - name: Typecheck web
        run: pnpm --filter @n3q/web exec tsc --noEmit

      - name: Typecheck mobile
        run: pnpm --filter @n3q/mobile exec tsc --noEmit

      - name: Lint web
        run: pnpm --filter @n3q/web lint
